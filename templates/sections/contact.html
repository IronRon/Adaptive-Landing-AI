{% load static %}
<!-- ═══════════════════════════════════════════════════════════════
     CONTACT – form + contact info
     ═══════════════════════════════════════════════════════════════ -->
<section class="section contact {{ contact_variant|default:'' }}" id="contact" data-section="contact" data-track="contact">
  <div class="container contact-inner">

    <div class="contact-info">
      <h2 class="section-heading">Get in Touch</h2>
      <p>Questions? Feedback? We'd love to hear from you.</p>

      <!-- Compact read-more: reveals contact details when in compact mode -->
      <button class="btn btn--text compact-read-more" aria-expanded="false" data-compact-toggle="contact" data-track-click="contact-read-more">
        Show contact details ▾
      </button>

      <ul class="contact-details">
        <li>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--clr-primary)" aria-hidden="true"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/></svg>
          <a href="tel:+12175551234">(217) 555-1234</a>
        </li>
        <li>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--clr-primary)" aria-hidden="true"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <a href="mailto:hello@sparklewash.com">hello@sparklewash.com</a>
        </li>
        <li>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--clr-primary)" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1112 7a2.5 2.5 0 010 5z"/></svg>
          <address>123 Main Street, Springfield, IL 62701</address>
        </li>
      </ul>
    </div>

    <form class="contact-form" id="contact-form" data-track="contact-form" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="contact-name">Name</label>
        <input type="text" id="contact-name" name="name" required autocomplete="name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label for="contact-email">Email</label>
        <input type="email" id="contact-email" name="email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="4" required placeholder="How can we help?"></textarea>
      </div>
      <button type="submit" class="btn btn--primary btn--block" data-track-click="contact-submit">Send Message</button>
    </form>

  </div>
</section>
